name: Validar Pull Request

on:
  pull_request:
    branches: [main] # Executa apenas em PRs destinados à main

jobs:
  validacao:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Verificar estrutura de arquivos
        run: |
          echo "Verificando se arquivos essenciais existem..."
          ls -la
          # Exemplo: Falha se não existir um README
          test -f README.md || (echo "ERRO: README.md obrigatório!" && exit 1)

      - name: Validar sintaxe Shell Script (opcional)
        # Se você tiver arquivos .sh, isso verifica se há erros neles
        run: |
          if ls *.sh 1> /dev/null 2>&1; then
            shellcheck *.sh
          else
            echo "Nenhum script shell para validar."
          fi

      - name: Simular Testes de Unidade
        run: |
          echo "Executando suite de testes..."
          # Aqui você colocaria seu comando real de teste (ex: pytest, go test, etc)
          sleep 5
          echo "Todos os testes passaram!"
# Exemplo: adicione uma linha de comentário no final do ci-cd.yml
      - name: Adicionar comentário ao arquivo
        run: |
          echo "# Este é um comentário adicionado ao final do arquivo ci-cd.yml" >> ci-cd.yml
          echo "Comentário adicionado com sucesso!"